<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>835-Cycler</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <header class="app-header">
        <div class="header-left">
            <h1 class="app-title">835-Cycler</h1>
            <span class="app-subtitle">EDI Remittance Viewer</span>
        </div>
        <nav class="main-nav">
            <a href="#/files" class="nav-link" data-page="files">Files</a>
            <a href="#/dashboard" class="nav-link" data-page="dashboard">Dashboard</a>
            <a href="#/claims" class="nav-link" data-page="claims">Claims</a>
            <a href="#/codes" class="nav-link" data-page="codes">Code Lookup</a>
        </nav>
        <button id="theme-toggle" class="theme-toggle" title="Toggle theme">
            <span class="theme-icon-light">&#9788;</span>
            <span class="theme-icon-dark">&#9790;</span>
        </button>
    </header>

    <main id="app-content" class="app-content">
        <div class="loading-spinner">Loading...</div>
    </main>

    <div id="toast-container" class="toast-container"></div>
    <div id="modal-overlay" class="modal-overlay hidden"></div>

    <script src="/js/components/toast.js"></script>
    <script src="/js/components/modal.js"></script>
    <script src="/js/components/table.js"></script>
    <script src="/js/components/filters.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/pages/files.js"></script>
    <script src="/js/pages/dashboard.js"></script>
    <script src="/js/pages/claims.js"></script>
    <script src="/js/pages/claim-detail.js"></script>
    <script src="/js/pages/code-lookup.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
